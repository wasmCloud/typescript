version: 2
updates:
  # GitHub Actions/Workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  # NPM Dependencies
  - package-ecosystem: 'npm'
    directories:
      - '/examples/components/*'
    groups:
      example-dependencies:
        update-types:
          - major
          - minor
          - patch
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
