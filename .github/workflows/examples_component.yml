name: Examples - Component

on:
  workflow_call:
    inputs:
      folder:
        type: string
        description: The folder name of the example component, relative to the ./examples/components folder
        required: true
      wasm-bin:
        type: string
        description: name of the wasm binary found inside the dist folder
        required: true
      test-command:
        type: string
        description: Command to run the test. The command should set TEST_RESULT to 0 or 1 based on the test result
        required: true
      skip-wadm:
        type: boolean
        description: Whether to skip wasmCloud host-based testing (true for components tested via transpile+demo)
        required: true
      force:
        type: boolean
        description: Force the build and test steps to run, even if no changes are detected
        required: true

env:
  DEPLOY_RETRIES: 60
  DEPLOY_TIMEOUT: 1
  TEST_RETRIES: 60
  TEST_TIMEOUT: 1

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      run-build: ${{ steps.force.outputs.force || steps.check-example-changes.outputs.changed == 'true' }}
    steps:
      - name: Force build if needed
        id: force
        if: inputs.force
        run: |
          echo "force=true" >> $GITHUB_OUTPUT

      - name: Checkout
        if: ${{ !inputs.force }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for Example Changes
        id: check-example-changes
        if: ${{ !inputs.force }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            changed:
              - 'examples/components/${{ inputs.folder }}/**'

  build:
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.run-build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'npm'
          cache-dependency-path: './examples/components/${{ inputs.folder }}/package-lock.json'
          node-version-file: './examples/components/${{ inputs.folder }}/.nvmrc'

      - name: Install Wash
        uses: wasmcloud/setup-wash-action@v2.0.0

      - name: Install JS Wasm Tools
        run: |
          npm install -g @bytecodealliance/jco@1.17.0
          npm install -g @bytecodealliance/componentize-js

      - name: Build
        working-directory: './examples/components/${{ inputs.folder }}'
        run: npm run install-and-build

      - name: run tests
        working-directory: './examples/components/${{ inputs.folder }}'
        run: npm run test

      - name: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.folder }}-wasm-bin
          path: ./examples/components/${{ inputs.folder }}/dist/${{ inputs.wasm-bin }}

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        if: ${{ inputs.skip-wadm }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: './examples/components/${{ inputs.folder }}/.nvmrc'

      - name: Install JS Wasm Tools
        if: ${{ inputs.skip-wadm }}
        run: npm install -g @bytecodealliance/jco@1.17.0

      - name: Install Wash
        uses: wasmcloud/setup-wash-action@v2.0.0

      - name: Download wasm-bin
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.folder }}-wasm-bin
          path: ./examples/components/${{ inputs.folder }}/dist/

      - name: Start wasmCloud host
        if: ${{ !inputs.skip-wadm }}
        run: wash up -d

      - name: Deploy application
        if: ${{ !inputs.skip-wadm }}
        working-directory: './examples/components/${{ inputs.folder }}'
        run: wash app deploy ./local.wadm.yaml

      - name: Wait for deployment
        if: ${{ !inputs.skip-wadm }}
        shell: bash
        run: |
          set -e
          TRIES=0
          while [[ $(wash get inventory --output=json | jq '.inventories[0].components | length') -eq 0 ]] ; do
            if [[ $TRIES -gt $DEPLOY_RETRIES ]]; then
              echo "❌ failed to find component in inventory after deploying example manifest"
              exit 1
            fi
            TRIES=$((TRIES+$DEPLOY_TIMEOUT))
            echo $(wash app list --output json | jq -r '.applications[0]')
            sleep 1
          done
          echo "✅ component started"

      - name: Test Functionality
        shell: bash
        if: inputs.test-command != ''
        working-directory: './examples/components/${{ inputs.folder }}'
        run: |
          set -xe
          TRIES=0
          TEST_RESULT=0
          while [[ $TEST_RESULT -eq 0 ]] ; do
            if [[ $TRIES -gt $TEST_RETRIES ]]; then
              echo "❌ test command failed after $TRIES retries"
              exit 1
            fi

            # Test command should update the TEST_RESULT variable to 0 or 1 based on the test result
            ${{ inputs.test-command }}

            TRIES=$((TRIES+$TEST_TIMEOUT));
            sleep 1;
          done;
          echo "✅ successfully ran test command";

      - name: Cleanup deployment
        if: ${{ always() && !inputs.skip-wadm }}
        working-directory: './examples/components/${{ inputs.folder }}'
        run: |
          wash app delete ./local.wadm.yaml || true
          wash down --all || true
