<!DOCTYPE html>
<html>
    <head>
        <title>Stylize Image</title>
        <style>
            form {
                display: grid;
                justify-content: center;
                gap: 20px;
            }
            label {
                height: 240px;
            }
            img {
                max-width: 100%;
                max-height: 100%;
            }
        </style>
    </head>
    <body>
        <form id="stylizeForm">
            <h1>Stylize Image</h1>
            <label id="contentImageContainer">
                <input type="file" id="contentImageInput" />
                <img id="contentImagePreview" />
            </label>
            <label id="styleImageContainer">
                <input type="file" id="styleImageInput" />
                <img id="styleImagePreview" />
            </label>
            <button type="submit" id="stylizeButton">Stylize</button>
            <img id="stylizedImage" />
        </form>
        <script>
            const stylizeForm = document.getElementById("stylizeForm");
            const contentImageContainer = document.getElementById("contentImage");
            const contentImageInput = document.getElementById("contentImageInput");
            const contentImagePreview = document.getElementById("contentImagePreview");
            const styleImageContainer = document.getElementById("styleImage");
            const styleImageInput = document.getElementById("styleImageInput");
            const styleImagePreview = document.getElementById("styleImagePreview");
            // const stylizeButton = document.getElementById("stylizeButton");
            const stylizedImage = document.getElementById("stylizedImage");
            let contentImageFile = null;
            let styleImageFile = null;

            contentImageInput.addEventListener("change", (event) => {
                contentImageFile = event.target.files[0];
                contentImagePreview.src = URL.createObjectURL(contentImageFile);
                contentImageInput.value = null;
            });
            styleImageInput.addEventListener("change", (event) => {
                styleImageFile = event.target.files[0];
                styleImagePreview.src = URL.createObjectURL(styleImageFile);
                styleImageInput.value = null;
            });

            stylizeForm.addEventListener("submit", (event) => {
                event.preventDefault();
                stylize();
            });

            async function stylize() {
                stylizedImage.src = "";
                const contentImage = await fileToDataUrl(contentImageFile);
                const styleImage = await fileToDataUrl(styleImageFile);

                const response = await fetch("/stylize", {
                    method: "POST",
                    body: JSON.stringify({
                        contentImage: {
                            dataUrl: contentImage,
                            height: contentImagePreview.naturalHeight,
                            width: contentImagePreview.naturalWidth,
                        },
                        styleImage: {
                            dataUrl: styleImage,
                            height: styleImagePreview.naturalHeight,
                            width: styleImagePreview.naturalWidth,
                        }
                    }),
                });
                const stylizedImageBuffer = await response.arrayBuffer();
                stylizedImage.src = URL.createObjectURL(new Blob([stylizedImageBuffer]));
            }

            function fileToDataUrl(file) {
                return new Promise((resolve, reject) => {
                    if (!file) {
                        reject(new Error("No file provided"));
                        return;
                    }

                    const reader = new FileReader();

                    reader.onload = () => {
                        resolve(reader.result);
                    };

                    reader.onerror = () => {
                        reject(reader.error || new Error("Failed to read file"));
                    };

                    reader.readAsDataURL(file);
                });
            }
        </script>
    </body>
</html>
