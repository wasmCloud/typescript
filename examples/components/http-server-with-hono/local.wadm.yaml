---
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: typescript-http-server-with-hono
  annotations:
    description: 'Demo of Typescript HTTP router component using Hono'
    wasmcloud.dev/authors: wasmCloud team
    wasmcloud.dev/source-url: https://github.com/wasmCloud/typescript/blob/main/examples/components/http-server-with-hono/local.wadm.yaml
    wasmcloud.dev/readme-md-url: https://github.com/wasmCloud/typescript/blob/main/examples/components/http-server-with-hono/README.md
    wasmcloud.dev/homepage: https://github.com/wasmCloud/typescript/tree/main/examples/components/http-server-with-hono
    wasmcloud.dev/categories: |
      http,http-server,typescript,example,router
spec:
  components:
    - name: http-server-with-hono
      type: component
      properties:
        image: file://./dist/http_server_with_hono.wasm
        config:
          - name: custom-config
            properties:
              public_config_json: '{"theme":"dark","version":"1.0.0","features":["logging","metrics"]}'
      traits:
        - type: spreadscaler
          properties:
            instances: 1

    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.26.0
      traits:
        - type: link
          properties:
            target:
              name: http-server-with-hono
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source:
              config:
                - name: default-http
                  properties:
                    address: 0.0.0.0:8000
