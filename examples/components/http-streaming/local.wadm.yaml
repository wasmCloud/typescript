---
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: typescript-streaming
  annotations:
    description: 'Demo of Typescript HTTP streaming component'
    wasmcloud.dev/authors: wasmCloud team
    wasmcloud.dev/source-url: https://github.com/wasmCloud/typescript/blob/main/examples/components/http-streaming/local.wadm.yaml
    wasmcloud.dev/readme-md-url: https://github.com/wasmCloud/typescript/blob/main/examples/components/http-streaming/README.md
    wasmcloud.dev/homepage: https://github.com/wasmCloud/typescript/tree/main/examples/components/http-streaming
    wasmcloud.dev/categories: |
      http,http-server,typescript,example
spec:
  components:
    - name: http-component
      type: component
      properties:
        image: file://./dist/http-streaming.wasm
      traits:
        - type: spreadscaler
          properties:
            instances: 1

    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.26.0
      traits:
        - type: link
          properties:
            target:
              name: http-component
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source:
              config:
                - name: default-http
                  properties:
                    address: 0.0.0.0:8000
